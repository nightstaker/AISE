# Phase-contract test case: verification phase against the hello-world
# Python CLI scenario.
#
# Input: post-main_entry snapshot (full source tree + per-component tests
# but no scenario tests yet). Output expected: tests/scenarios/* + a
# qa_report.json reflecting the toolchain check + suite run.
#
# Note: this case requires ``pytest`` on PATH (it's a build dep) so
# qa_engineer's toolchain check passes and qa_report records ran=true.
# If pytest is missing, qa_engineer is allowed by contract to set
# ran=false and write_only the test files — both branches are covered
# below via severity=warn on the run-result assertions.
#
# Run with:
#   aise v2-phase-test --case tests/fixtures/v2_phase_io/python_cli_hello_world/verification/case.yaml

aise_version: "0.1.0"
scenario_id: python_cli_hello_world
phase: verification

input_dir: input/
project_config_file: project_config.json

requirement: |
  Build a Python CLI tool that prints 'hello, world' when run.

max_review_iterations: 1
timeout_sec: 1200

assertions:
  # -- Scenario test files (qa_engineer derives one per behavioral_contract
  #    scenario; for hello_world this is at least 5: default print,
  #    version flag, help flag, exit code, exact output). --
  - name: scenario_dir_has_default_print
    path: tests/scenarios/test_default_print.py
    predicate: file_exists

  # The `min_scenarios` predicate validates behavioral_contract had
  # enough scenario entries to drive fanout — a sanity check that the
  # input is rich enough to exercise the phase.
  - name: behavioral_contract_has_enough_scenarios
    path: docs/behavioral_contract.json
    predicate:
      min_scenarios: 3

  # -- QA report --
  - name: qa_report_present
    path: docs/qa_report.json
    predicate: file_exists

  - name: qa_report_valid_json
    path: docs/qa_report.json
    predicate:
      schema: schemas/process_v2.schema.json
    # Soft: process_v2 schema is not the qa_report schema; we just want
    # JSON-parseability. ``schema`` predicate fails on unknown extra keys
    # only if the schema declares additionalProperties=false — process_v2
    # uses ``additionalProperties: true`` for forward-compat, so this
    # effectively reduces to "is valid JSON & is an object". Mark warn
    # since the structural shape isn't gated.
    severity: warn

  # -- Sanity: tests/scenarios/ directory should have at least 1 file
  #    (count is computed against the produced filesystem, but our
  #    predicate registry doesn't have a generic "dir count" — instead
  #    we rely on the explicit file_exists checks above to bound it). --
