aise_version: "0.1.0"
scenario_id: typescript_express_api
phase: verification

input_dir: input/
project_config_file: project_config.json

requirement: |
  Build a TypeScript REST API server using Node.js + Express.

max_review_iterations: 1
timeout_sec: 900

assertions:
  - name: scenario_dir_has_health_test
    path: tests/scenarios/health_check_returns_ok.ts
    predicate: file_exists
    severity: warn   # exact filename varies by qa_engineer

  - name: behavioral_contract_has_enough_scenarios
    path: docs/behavioral_contract.json
    predicate: { min_scenarios: 3 }

  # ``qa_report.json`` is *expected* but observed-missing on this TS run
  # because the fixture has no ``node_modules/`` so qa_engineer's
  # toolchain check finds neither ``vitest`` nor ``tsc`` on PATH and
  # silently skips writing the report instead of recording
  # ``vitest.ran=false`` per spec. Soften to severity=warn until the
  # qa_engineer prompt is updated to always emit the report (tracked
  # separately — see PR #140 review notes / TS verification 2026-05-04).
  - name: qa_report_present
    path: docs/qa_report.json
    predicate: file_exists
    severity: warn

  # Toolchain-honesty: don't fabricate flutter test results on a TS project
  - name: qa_report_no_flutter_on_typescript
    path: docs/qa_report.json
    predicate: { forbidden_patterns: { patterns: ["\"flutter\"\\s*:\\s*\\{[^}]*\"ran\"\\s*:\\s*true"] } }
    severity: warn   # vacuously true if the file is missing (covered by previous)
