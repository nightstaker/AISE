# Phase-contract test case: verification phase against the Flutter
# magic-tower scenario.
#
# Input: post-main_entry snapshot (lib/main.dart + lib/{ui,gameplay,system,data}/* + test/*).
# Output expected: tests/scenarios/* (one per behavioral_contract scenario)
# + docs/qa_report.json. Flutter binary will be missing on the test
# host — qa_engineer should honestly record flutter.ran=false rather
# than fabricate pass/fail counts (the magic_tower 2026-04-29 incident).
#
# Run with:
#   aise v2-phase-test --case tests/fixtures/v2_phase_io/flutter_mobile_game/verification/case.yaml

aise_version: "0.1.0"
scenario_id: flutter_mobile_game
phase: verification

input_dir: input/
project_config_file: project_config.json

requirement: |
  开发一款可以上架商店的商用魔塔（Magic Tower）手机游戏 APP（Flutter + Dart）。

max_review_iterations: 1
timeout_sec: 1500

assertions:
  # -- Behavioral scenario tests must exist (qa_engineer fans out from
  #    behavioral_contract.scenarios[]). At least one canonical scenario
  #    of the magic_tower spec should land. --
  - name: scenario_dir_has_some_dart_test
    path: tests/scenarios/scenario_start_to_floor2.dart
    predicate: file_exists
    severity: warn   # exact filename varies by qa_engineer choice

  - name: behavioral_contract_has_enough_scenarios
    path: docs/behavioral_contract.json
    predicate:
      min_scenarios: 3

  # -- QA report: presence is required. Schema-validation is warn-only
  #    because process_v2.schema.json isn't qa_report's schema; we just
  #    want the file to exist + parse as JSON (the predicate's bare
  #    json_field_equals on a known field would be more precise but
  #    requires knowing qa_report's structure ahead of time). --
  - name: qa_report_present
    path: docs/qa_report.json
    predicate: file_exists

  # -- Toolchain-honesty guard. With flutter binary absent, qa_engineer
  #    MUST record flutter.ran=false rather than fabricating pass/fail
  #    counts. We can't easily express "if X then Y" in our predicate
  #    DSL, so we assert the negative form: don't claim to have run
  #    pytest on a Flutter project. --
  - name: qa_report_no_pytest_on_flutter
    path: docs/qa_report.json
    predicate:
      forbidden_patterns:
        patterns: ["\"pytest\"\\s*:\\s*\\{[^}]*\"ran\"\\s*:\\s*true"]
